name: 🏗️ Build & Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      # ── Checkout ──────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Setup Python ──────────────────────────
      - name: ⚙️ Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── Install Dependencies ──────────────────
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt

      # ── Syntax Check ──────────────────────────
      - name: 🔍 Check Python syntax
        run: |
          python -m py_compile volume_sorted_coin_list.py
          python -m py_compile exchanges.py

      # ── Import Check ──────────────────────────
      - name: ✅ Verify imports work
        run: |
          python -c "from exchanges import SUPPORTED_EXCHANGES; print('Exchanges module OK')"
          python -c "import volume_sorted_coin_list; print('Main module OK')"

      # ── Test Run (Single Exchange) ────────────
      - name: 🧪 Test run with Binance
        run: |
          python volume_sorted_coin_list.py --output-format json
        env:
          EXCHANGE_CCXT: binance

      # ── Verify Output ─────────────────────────
      - name: 📝 Verify output files created
        run: |
          ls -la output/
          test -f output/binance_active_coins_list.json && echo "✓ JSON output created"

      # ── Test All Output Formats ───────────────
      - name: 📊 Test all output formats
        run: |
          rm -f output/*
          python volume_sorted_coin_list.py --output-format all
          echo "Files created:"
          ls -la output/
