name: 📦 Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (required, e.g. v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      draft:
        description: "Create as draft"
        required: false
        type: boolean
        default: false

jobs:
  create-tag:
    name: 🏷️ Create Git Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ── Checkout ──────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Create and Push Tag ───────────────────
      - name: 🏷️ Create and push tag
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

  release:
    name: 📦 Create Release
    needs: create-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Checkout ──────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Setup Python ──────────────────────────
      - name: ⚙️ Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Build Distribution ────────────────────
      - name: 📦 Build Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
        continue-on-error: true

      # ── Create GitHub Release ─────────────────
      - name: 📦 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Release Summary ───────────────────────
      - name: 📊 Release Summary
        shell: bash
        run: |
          echo "## 📦 Release Created Successfully!"
          echo ""
          echo "**Tag:** ${{ inputs.tag }}"
          echo "**Draft:** ${{ inputs.draft }}"
          echo "**Pre-release:** ${{ inputs.prerelease }}"
          echo ""
          echo "### 📝 Next Steps"
          echo "1. Update CHANGELOG.md if needed"
          echo "2. Update README.md version references"
          echo "3. Notify users about the new release"
